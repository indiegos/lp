<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Belanja online dengan harga terbaik di Shopee dan Tokopedia">
    <meta name="keywords" content="belanja online, shopee, tokopedia, affiliate, promo">
    <meta property="og:title" content="Belanja Hemat - Shopee & Tokopedia">
    <meta property="og:description" content="Temukan ribuan produk pilihan dengan harga terjangkau">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#5B9EED">
    <title>Belanja Hemat - Shopee & Tokopedia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --shopee-orange: #EE5A3F;
            --tokopedia-green: #1DB446;
            --primary-blue: #5B9EED;
            --gradient-blue: linear-gradient(135deg, #5B9EED 0%, #3B82F6 100%);
            --dark-bg: #0F1419;
            --light-gray: #F8F9FA;
            --white: #FFFFFF;
            --text-dark: #1A1A1A;
            --text-light: #666666;
            --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.15);
            --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Roboto, 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background-color: var(--white);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* MAIN CONTAINER */
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER SECTION */
        .header {
            padding: 24px 20px;
            text-align: center;
            background: var(--white);
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 0.95rem;
            color: var(--text-light);
            font-weight: 500;
        }

        /* MAIN CONTENT */
        .content {
            flex: 1;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        /* HERO IMAGE SECTION */
        .hero-section {
            width: 100%;
            margin-bottom: 32px;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-image {
            width: 100%;
            aspect-ratio: 3 / 2;
            background: var(--gradient-blue);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            position: relative;
            transition: var(--transition);
        }

        .hero-image:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(91, 158, 237, 0.25);
        }

        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .hero-image.no-image::before {
            content: '🛍️';
            font-size: 4rem;
            margin-right: 12px;
        }

        /* BUTTONS SECTION */
        .buttons-section {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 32px;
            animation: fadeUp 0.6s ease-out 0.1s both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cta-button {
            padding: 16px 20px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: var(--shadow-md);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            position: relative;
            overflow: hidden;
            font-size: 0.95rem;
            flex-direction: column;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.15);
            transition: left 0.4s ease;
            z-index: 1;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:active {
            transform: scale(0.95);
        }

        .btn-shopee {
            background: linear-gradient(135deg, #F57C3B 0%, #EE5A3F 100%);
            color: white;
        }

        .btn-shopee:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(238, 90, 63, 0.3);
        }

        .btn-shopee:active {
            box-shadow: 0 4px 12px rgba(238, 90, 63, 0.3);
        }

        .btn-tokopedia {
            background: linear-gradient(135deg, #1EC454 0%, #1DB446 100%);
            color: white;
        }

        .btn-tokopedia:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(29, 180, 70, 0.3);
        }

        .btn-tokopedia:active {
            box-shadow: 0 4px 12px rgba(29, 180, 70, 0.3);
        }

        .button-icon {
            font-size: 1.4rem;
        }

        .button-text {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .button-label {
            font-size: 0.75rem;
            opacity: 0.9;
            text-transform: capitalize;
            font-weight: 600;
        }

        /* FOOTER */
        footer {
            background: var(--text-dark);
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            margin-top: auto;
        }

        footer p {
            margin: 6px 0;
        }

        .social-links {
            margin: 12px 0;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .social-links a {
            color: var(--white);
            text-decoration: none;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .social-links a:hover {
            color: var(--primary-blue);
            transform: translateY(-2px);
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 480px) {
            .header {
                padding: 20px 16px;
            }

            .header h1 {
                font-size: 1.4rem;
            }

            .header p {
                font-size: 0.9rem;
            }

            .content {
                padding: 20px 12px;
            }

            .hero-section {
                margin-bottom: 24px;
            }

            .hero-image {
                aspect-ratio: 3 / 2;
                border-radius: var(--radius-md);
            }

            .buttons-section {
                gap: 10px;
                margin-bottom: 24px;
            }

            .cta-button {
                padding: 14px 16px;
                font-size: 0.9rem;
                letter-spacing: 0.6px;
                gap: 6px;
            }

            .button-icon {
                font-size: 1.2rem;
            }

            .button-text {
                gap: 1px;
            }

            .button-label {
                font-size: 0.7rem;
            }
        }

        @media (max-width: 360px) {
            .header h1 {
                font-size: 1.2rem;
            }

            .content {
                padding: 16px 12px;
            }

            .cta-button {
                padding: 12px 14px;
                font-size: 0.85rem;
                border-radius: var(--radius-sm);
            }
        }

        /* TABLET OPTIMIZATION */
        @media (min-width: 768px) {
            .header {
                padding: 32px 20px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .content {
                padding: 40px 20px;
            }

            .hero-image {
                aspect-ratio: 16 / 9;
                border-radius: var(--radius-lg);
            }

            .buttons-section {
                gap: 16px;
                margin-bottom: 40px;
            }

            .cta-button {
                padding: 18px 24px;
                font-size: 1rem;
            }
        }

        /* DESKTOP OPTIMIZATION */
        @media (min-width: 1024px) {
            .container {
                max-width: 700px;
            }

            .header h1 {
                font-size: 2.2rem;
            }

            .hero-image {
                aspect-ratio: 16 / 10;
            }

            .cta-button {
                padding: 20px 28px;
                font-size: 1.05rem;
            }

            .buttons-section {
                gap: 18px;
            }
        }

        /* ANIMATIONS */
        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }

        /* TOAST NOTIFICATION */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--text-dark);
            color: white;
            padding: 14px 18px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.4s ease-out;
            z-index: 1000;
            max-width: 320px;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ACCESSIBILITY */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }

        /* PRINT */
        @media print {
            .hero-section,
            .buttons-section {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <h1>Belanja Hemat Online</h1>
            <p>Promo Spesial Hari Ini</p>
        </header>

        <!-- MAIN CONTENT -->
        <main class="content">
            <!-- HERO IMAGE -->
            <section class="hero-section">
                <div class="hero-image no-image" id="heroImage">
                    Gambar Produk
                </div>
            </section>

            <!-- CTA BUTTONS -->
            <section class="buttons-section">
                <a href="javascript:void(0)" class="cta-button btn-shopee" id="btnShopee" title="Belanja di Shopee">
                    <span class="button-icon">🛒</span>
                    <span class="button-text">
                        <span class="button-label">Belanja di</span>
                        <span>SHOPEE</span>
                    </span>
                </a>
                <a href="javascript:void(0)" class="cta-button btn-tokopedia" id="btnTokopedia" title="Belanja di Tokopedia">
                    <span class="button-icon">🛍️</span>
                    <span class="button-text">
                        <span class="button-label">Belanja di</span>
                        <span>TOKOPEDIA</span>
                    </span>
                </a>
            </section>
        </main>

        <!-- FOOTER -->
        <footer>
            <p>&copy; <span id="year"></span> Belanja Hemat. Semua Hak Dilindungi.</p>
            <div class="social-links">
                <a href="javascript:void(0)" title="Facebook">Facebook</a>
                <a href="javascript:void(0)" title="Instagram">Instagram</a>
                <a href="javascript:void(0)" title="WhatsApp">WhatsApp</a>
            </div>
        </footer>
    </div>

    <script>
        // ============================================
        // CONFIGURATION - SESUAIKAN DENGAN LINK AFFILIATE
        // ============================================
        const CONFIG = {
            shopeeLink: 'https://shopee.co.id/',
            tokopediaLink: 'https://www.tokopedia.com/',
            heroImageUrl: null,
            trackingEnabled: true,
            analyticsId: 'GA_MEASUREMENT_ID'
        };

        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Landing Page Loaded');
            initializeApp();
            setupEventListeners();
            loadHeroImage();
            setupTracking();
        });

        // ============================================
        // CORE FUNCTIONS
        // ============================================

        /**
         * Initialize app on page load
         */
        function initializeApp() {
            // Set tahun di footer
            document.getElementById('year').textContent = new Date().getFullYear();
            
            // Add page visibility change tracking
            document.addEventListener('visibilitychange', function() {
                if (document.visibilityState === 'visible') {
                    trackPageView();
                }
            });

            // Performance observer untuk monitoring
            if (window.PerformanceObserver) {
                try {
                    const observer = new PerformanceObserver((list) => {
                        for (const entry of list.getEntries()) {
                            console.log(`Performance: ${entry.name} - ${entry.duration.toFixed(2)}ms`);
                        }
                    });
                    observer.observe({ entryTypes: ['navigation', 'resource'] });
                } catch (e) {
                    console.log('Performance monitoring not available');
                }
            }
        }

        /**
         * Setup event listeners untuk buttons
         */
        function setupEventListeners() {
            const btnShopee = document.getElementById('btnShopee');
            const btnTokopedia = document.getElementById('btnTokopedia');

            if (btnShopee) {
                btnShopee.addEventListener('click', (e) => handleButtonClick(e, 'shopee', CONFIG.shopeeLink));
                btnShopee.addEventListener('mouseover', addButtonHoverEffect);
                btnShopee.addEventListener('mouseout', removeButtonHoverEffect);
            }

            if (btnTokopedia) {
                btnTokopedia.addEventListener('click', (e) => handleButtonClick(e, 'tokopedia', CONFIG.tokopediaLink));
                btnTokopedia.addEventListener('mouseover', addButtonHoverEffect);
                btnTokopedia.addEventListener('mouseout', removeButtonHoverEffect);
            }

            // Touch events untuk mobile
            document.addEventListener('touchstart', function() {}, false);
        }

        /**
         * Load hero image jika tersedia
         */
        function loadHeroImage() {
            const heroImage = document.getElementById('heroImage');
            
            if (!heroImage) return;

            if (CONFIG.heroImageUrl) {
                const img = document.createElement('img');
                img.src = CONFIG.heroImageUrl;
                img.alt = 'Produk Pilihan';
                img.onerror = function() {
                    console.log('Hero image failed to load');
                    heroImage.classList.add('no-image');
                };
                img.onload = function() {
                    heroImage.innerHTML = '';
                    heroImage.appendChild(img);
                };
            }
        }

        /**
         * Handle button click event
         */
        function handleButtonClick(e, platform, url) {
            e.preventDefault();
            
            // Add visual feedback
            const button = e.currentTarget;
            button.style.transform = 'scale(0.95)';
            setTimeout(() => {
                button.style.transform = '';
            }, 150);

            // Track click
            if (CONFIG.trackingEnabled) {
                trackClick(platform);
            }

            // Show notification
            showToast(`Membuka ${platform === 'shopee' ? 'Shopee' : 'Tokopedia'}...`);

            // Open link after brief delay
            setTimeout(() => {
                window.open(url, '_blank');
            }, 300);
        }

        /**
         * Add hover effect to buttons
         */
        function addButtonHoverEffect(e) {
            const ripple = document.createElement('div');
            ripple.style.position = 'absolute';
            ripple.style.width = '20px';
            ripple.style.height = '20px';
            ripple.style.background = 'rgba(255,255,255,0.5)';
            ripple.style.borderRadius = '50%';
            ripple.style.pointerEvents = 'none';
            ripple.style.animation = 'ripple 0.6s ease-out';
            
            const rect = this.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            ripple.style.left = (x - 10) + 'px';
            ripple.style.top = (y - 10) + 'px';
            
            this.style.position = 'relative';
            this.style.overflow = 'hidden';
            
            // Hanya tambahkan ripple jika masih ada space
            if (this.children.length < 5) {
                this.appendChild(ripple);
            }
        }

        /**
         * Remove hover effect from buttons
         */
        function removeButtonHoverEffect(e) {
            // Cleanup ripples
            const ripples = this.querySelectorAll('[style*="animation"]');
            ripples.forEach(ripple => {
                setTimeout(() => ripple.remove(), 600);
            });
        }

        /**
         * Track affiliate click
         */
        function trackClick(platform) {
            try {
                // Google Analytics tracking
                if (window.gtag) {
                    gtag('event', 'affiliate_click', {
                        'event_category': 'engagement',
                        'event_label': platform,
                        'timestamp': new Date().toISOString()
                    });
                }

                // Local storage tracking
                const key = `affiliate_click_${platform}`;
                const sessionKey = `session_clicks_${platform}`;
                
                const totalClicks = parseInt(localStorage.getItem(key) || '0') + 1;
                const sessionClicks = parseInt(sessionStorage.getItem(sessionKey) || '0') + 1;
                
                localStorage.setItem(key, totalClicks);
                sessionStorage.setItem(sessionKey, sessionClicks);

                console.log(`Click tracked: ${platform} (Total: ${totalClicks}, Session: ${sessionClicks})`);
            } catch (error) {
                console.error('Tracking error:', error);
            }
        }

        /**
         * Track page view
         */
        function trackPageView() {
            try {
                if (window.gtag) {
                    gtag('config', CONFIG.analyticsId, {
                        'page_path': window.location.pathname,
                        'page_title': document.title,
                        'timestamp': new Date().toISOString()
                    });
                }
                
                // Local session tracking
                const key = 'page_views';
                const views = parseInt(sessionStorage.getItem(key) || '0') + 1;
                sessionStorage.setItem(key, views);
            } catch (error) {
                console.error('Page view tracking error:', error);
            }
        }

        /**
         * Setup tracking system
         */
        function setupTracking() {
            // Track page exit
            window.addEventListener('beforeunload', function() {
                const timeOnPage = Date.now() - window.pageLoadTime;
                if (CONFIG.trackingEnabled) {
                    console.log(`Time on page: ${timeOnPage}ms`);
                }
            });

            window.pageLoadTime = Date.now();
        }

        /**
         * Show toast notification
         */
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toast.role = 'status';
            toast.setAttribute('aria-live', 'polite');
            
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideDown 0.4s ease-out forwards';
                setTimeout(() => toast.remove(), 400);
            }, 2500);
        }

        /**
         * Get click statistics
         */
        function getClickStats() {
            return {
                shopeeTotal: parseInt(localStorage.getItem('affiliate_click_shopee') || '0'),
                tokopediaTotal: parseInt(localStorage.getItem('affiliate_click_tokopedia') || '0'),
                shopeeSession: parseInt(sessionStorage.getItem('session_clicks_shopee') || '0'),
                tokopediaSession: parseInt(sessionStorage.getItem('session_clicks_tokopedia') || '0')
            };
        }

        // Make stats available in console
        window.getStats = getClickStats;

        // ============================================
        // PERFORMANCE OPTIMIZATION
        // ============================================

        // Lazy load images
        if ('IntersectionObserver' in window) {
            const imageObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        if (img.dataset.src) {
                            img.src = img.dataset.src;
                            img.removeAttribute('data-src');
                            observer.unobserve(img);
                        }
                    }
                });
            });

            document.querySelectorAll('img[data-src]').forEach(img => imageObserver.observe(img));
        }

        // Prefetch external links
        if ('prefetch' in document.head) {
            const links = [CONFIG.shopeeLink, CONFIG.tokopediaLink];
            links.forEach(link => {
                const prefetchLink = document.createElement('link');
                prefetchLink.rel = 'prefetch';
                prefetchLink.href = link;
                document.head.appendChild(prefetchLink);
            });
        }

        // ============================================
        // CSS ANIMATIONS (untuk ripple effect)
        // ============================================
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                from {
                    opacity: 1;
                    transform: scale(0);
                }
                to {
                    opacity: 0;
                    transform: scale(4);
                }
            }

            @keyframes slideDown {
                from {
                    transform: translateY(20px);
                    opacity: 1;
                }
                to {
                    transform: translateY(0);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // ============================================
        // ERROR HANDLING
        // ============================================
        window.addEventListener('error', function(event) {
            console.error('Global error:', event.error);
        });

        window.addEventListener('unhandledrejection', function(event) {
            console.error('Unhandled promise rejection:', event.reason);
        });
    </script>
</body>
</html>
