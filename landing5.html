        }

        /* skeleton shimmer */
        .hero-skeleton {

            inset: 0;

            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;

        @keyframes shimmer {

            100% { background-position: -200% 0; }
        }

<script>

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function renderStars(score) {
    const full = Math.floor(score);
    const half = (score % 1) >= 0.5 ? 1 : 0;
    const empty = 5 - full - half;
    let html = '<span class="stars">';
    for (let i = 0; i < full;  i++) html += '<span class="star filled">★</span>';
    if (half)                        html += '<span class="star half">★</span>';
    for (let i = 0; i < empty; i++) html += '<span class="star">★</span>';
    return html + '</span>';
}

function getInitials(name) {
    return name.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
}

// ═══════════════════════════════════════════════════════════
// AFFILIATE COOKIE TRACKER — 7 hari
// ═══════════════════════════════════════════════════════════
const COOKIE_EXPIRY_DAYS = 7;
const COOKIE_NAME        = 'affiliate_clicks';
const MAX_ENTRIES        = 50;

function setCookie(name, value, days) {
    const expires = new Date(Date.now() + days * 864e5).toUTCString();
    document.cookie = `${name}=${encodeURIComponent(JSON.stringify(value))}; expires=${expires}; path=/; SameSite=Lax`;
}

function getCookie(name) {
    const match = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/([.*+?^=!:${}()|[\]/\\])/g, '\\$1') + '=([^;]*)'));
    try { return match ? JSON.parse(decodeURIComponent(match[1])) : null; } catch { return null; }
}

function trackAffiliateClick(source, product, url) {
    const existing = getCookie(COOKIE_NAME) || [];
    existing.push({ source, product, url, time: new Date().toISOString() });
    setCookie(COOKIE_NAME, existing.slice(-MAX_ENTRIES), COOKIE_EXPIRY_DAYS);
    console.info('[Affiliate Tracker] ✓', { source, product });
}

window.getAffiliateClicks = () => {
    const data = getCookie(COOKIE_NAME);
    if (!data || !data.length) { console.log('Belum ada data klik.'); return []; }
    console.table(data); return data;
};

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
    renderHeroImage();
    renderInfoTable();
    renderReviews();

});

// ── Hero: lazy load via IntersectionObserver + skeleton shimmer ──
function renderHeroImage() {
    const wrapper  = document.getElementById('heroImage');
    const skeleton = document.getElementById('heroSkeleton');

    if (!CONFIG.heroImageUrl) {
        skeleton.remove();
        wrapper.classList.add('no-image');
        wrapper.innerHTML = '<div>Gambar Produk</div>';
        return;
    }

    const img = document.createElement('img');
    img.alt   = CONFIG.heroTitle;

    const observer = new IntersectionObserver((entries, obs) => {
        if (!entries[0].isIntersecting) return;
        obs.disconnect();
        img.src = CONFIG.heroImageUrl;
    }, { rootMargin: '200px' });

    observer.observe(wrapper);

    img.onload = () => {
        skeleton.style.transition = 'opacity 0.35s';
        skeleton.style.opacity = '0';
        setTimeout(() => { if (skeleton.parentNode) skeleton.remove(); }, 350);
        img.classList.add('loaded');
        wrapper.appendChild(img);
    };

    img.onerror = () => {
        skeleton.remove();
        wrapper.classList.add('no-image');
        wrapper.innerHTML = '<div>Gambar tidak dapat dimuat</div>';
    };
}

// ── Info table ──
function renderInfoTable() {
    document.getElementById('mainProductTitle').textContent = CONFIG.heroTitle;
    const table = document.getElementById('infoTable');
    table.innerHTML = '';

    CONFIG.productInfo.forEach(row => {
        const tr      = document.createElement('tr');
        const tdLabel = document.createElement('td');
        tdLabel.textContent = row.label;

        const tdVal = document.createElement('td');

        if (row.isRating) {
            tdVal.innerHTML = `
                <div class="stars-row">
                    ${renderStars(row.score)}
                    <span style="font-size:1rem;font-weight:800;color:#F59E0B">${row.score}</span>
                    <span class="rating-count">(${row.count})</span>
                </div>`;
        } else if (row.isPrice) {
            let html = `<span class="price-value">${row.value}</span>`;
            if (row.originalPrice) html += `<span class="price-original">${row.originalPrice}</span>`;
            if (row.discount)      html += `<span class="discount-badge">-${row.discount}</span>`;
            tdVal.innerHTML = html;
        } else {
            tdVal.textContent = row.value;
        }

        tr.appendChild(tdLabel);
        tr.appendChild(tdVal);
        table.appendChild(tr);
    });
}

// ── Reviews ──
function renderReviews() {
    if (!CONFIG.reviews || CONFIG.reviews.length === 0) return;

    const section = document.getElementById('reviewSection');
    section.style.display = 'block';

    const avg = (CONFIG.reviews.reduce((s, r) => s + r.rating, 0) / CONFIG.reviews.length).toFixed(1);

    document.getElementById('reviewSummary').innerHTML = `
        <div class="review-score">${avg}</div>
        <div class="review-summary-right">
            ${renderStars(parseFloat(avg))}
            <div class="review-total">dari ${CONFIG.reviews.length} ulasan pembeli terverifikasi</div>
        </div>`;

    const list = document.getElementById('reviewList');
    list.innerHTML = '';

    CONFIG.reviews.forEach(r => {
        const card = document.createElement('div');
        card.className = 'review-card';
        card.innerHTML = `
            <div class="review-header">
                <div class="reviewer-avatar">${getInitials(r.name)}</div>
                <div class="reviewer-info">
                    <div class="reviewer-name">${r.name} <span class="loc">· ${r.location}</span></div>
                    <div class="reviewer-meta">
                        ${renderStars(r.rating)}
                        <span class="review-date">${r.date}</span>
                        ${r.verified ? '<span class="verified-badge">✔ Pembelian Terverifikasi</span>' : ''}
                    </div>
                </div>
            </div>
            <div class="review-text">${r.text}</div>`;
        list.appendChild(card);
    });
}

// ── CTA Buttons ──
function setupButtons() {
    document.getElementById('btnShopee').addEventListener('click', () => {
        trackAffiliateClick('shopee', CONFIG.heroTitle, CONFIG.shopeeLink);
        window.open(CONFIG.shopeeLink, '_blank', 'noopener,noreferrer');
    });
    document.getElementById('btnTokopedia').addEventListener('click', () => {
        trackAffiliateClick('tokopedia', CONFIG.heroTitle, CONFIG.tokopediaLink);
        window.open(CONFIG.tokopediaLink, '_blank', 'noopener,noreferrer');
    });
}

// ── Related Products ──
function renderRelatedProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '';

    CONFIG.relatedProducts.forEach(product => {
        const card = document.createElement('a');
        card.className = 'product-card';
        card.href      = product.productLink;
        card.target    = '_blank';
        card.rel       = 'noopener noreferrer';
        card.setAttribute('aria-label', `Lihat produk: ${product.title}`);

        card.addEventListener('click', e => {
            e.preventDefault();
            trackAffiliateClick('related', product.title, product.productLink);
            window.open(product.productLink, '_blank', 'noopener,noreferrer');
        });

        // Gambar
        const imgWrap = document.createElement('div');
        imgWrap.className = 'product-image';
        if (product.imageUrl) {
            const img   = document.createElement('img');
            img.src     = product.imageUrl;
            img.alt     = product.title;
            img.loading = 'lazy';
            img.onerror = () => { imgWrap.classList.add('no-image'); imgWrap.innerHTML = '<span>Gambar tidak tersedia</span>'; };
            imgWrap.appendChild(img);
        } else {
            imgWrap.classList.add('no-image');
            imgWrap.innerHTML = '<span>Gambar tidak tersedia</span>';
        }

        // Body
        const body = document.createElement('div');
        body.className = 'product-body';

        const nameEl = document.createElement('div');
        nameEl.className = 'product-name';
        nameEl.textContent = product.title;

        const priceEl = document.createElement('div');
        priceEl.className = 'product-price';
        priceEl.innerHTML = product.price;
        if (product.originalPrice) priceEl.innerHTML += `<span class="orig">${product.originalPrice}</span>`;

        const starsEl = document.createElement('div');
        starsEl.className = 'product-stars';
        starsEl.innerHTML = `${renderStars(product.rating)} <span class="sold">${product.sold}</span>`;

        const btn = document.createElement('span');
        btn.className   = 'product-link';
        btn.textContent = 'Lihat Produk';

        body.appendChild(nameEl);
        body.appendChild(priceEl);
        body.appendChild(starsEl);
        body.appendChild(btn);
        card.appendChild(imgWrap);
        card.appendChild(body);
        grid.appendChild(card);
    });
}
</script>
